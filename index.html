<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unhas Iracema</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#1e3a8a,#9333ea,#ec4899);
background-size:400% 400%;
animation:fundo 10s infinite alternate;
color:white;
text-align:center;
}

@keyframes fundo{
0%{background-position:left}
100%{background-position:right}
}

header{
padding:25px;
font-size:32px;
font-weight:bold;
}

.container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
padding:20px;
}

.card{
background:white;
color:#111;
width:220px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
padding:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin:10px 0 5px;
}

.preco{
font-size:22px;
color:#16a34a;
font-weight:bold;
}

.btn{
display:inline-block;
margin-top:10px;
background:#25D366;
color:white;
padding:8px 14px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

.local{
margin-top:30px;
font-size:18px;
}

footer{
margin-top:20px;
padding:15px;
font-size:14px;
}

</style>
</head>

<body>

<header>
💅 Unhas Iracema
</header>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1604654894610-df63bc536371">
<h3>Unha</h3>
<div class="preco">R$30</div>
<a class="btn" href="https://wa.me/5585999010932?text=Olá quero agendar Unha">Agendar</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348">
<h3>Pé e Mão</h3>
<div class="preco">R$50</div>
<a class="btn" href="https://wa.me/5585999010932?text=Olá quero agendar Pé e Mão">Agendar</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5">
<h3>Depilação</h3>
<div class="preco">R$100</div>
<a class="btn" href="https://wa.me/5585999010932?text=Olá quero agendar Depilação">Agendar</a>
</div>

</div>

<div class="local">
📍 Avenida Augusto dos Anjos 220<br>
Fortaleza - CE
</div>

<footer>
WhatsApp: 85 99901-0932
</footer>

</body>
</html>
